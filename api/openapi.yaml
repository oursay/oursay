  /v1/civic/appends/prepare:
    post:
      summary: "Prepare an append: server-derived fields for a civic intent"
      tags:
        - civic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                author:
                  type: string
                  description: Thread persona pubkey the action is authored as (must be the
                    caller's).
                intent:
                  type: object
                  description: A civic intent. `content` is the raw payload (kept private); the
                    server returns the fields to sign.
                  properties:
                    op:
                      type: string
                      enum:
                        - create
                        - update
                        - delete
                    type:
                      type: string
                      enum:
                        - post
                        - comment
                        - reaction
                        - petition
                        - petition_signature
                        - poll
                        - vote
                    entityId:
                      type: string
                      description: Caller-chosen entity id (client and server must agree).
                    parent:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - post
                            - comment
                            - reaction
                            - petition
                            - petition_signature
                            - poll
                            - vote
                        id:
                          type: string
                      required:
                        - type
                        - id
                      additionalProperties: false
                    content:
                      description: Opaque payload (any JSON). Never published in plaintext.
                  required:
                    - op
                    - type
                    - entityId
                  additionalProperties: false
              required:
                - author
                - intent
              additionalProperties: false
      security: *a1
      responses:
        "200":
          description: Server-derived fields the client must sign over (mirrors
            RecordService.prepareAppend).
          content:
            application/json:
              schema:
                type: object
                description: Server-derived fields the client must sign over (mirrors
                  RecordService.prepareAppend).
                properties:
                  prevHash:
                    type: string
                    nullable: true
                  parentType:
                    type: string
                  parentId:
                    type: string
                  parentRevisionHash:
                    type: string
                  parentRevisionTxId:
                    type: string
                  rootEntityId:
                    type: string
                  nullifierParentId:
                    type: string
                  nullifier:
                    type: string
                required:
                  - prevHash
                  - rootEntityId
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
