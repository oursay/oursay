                  handle:
                    type:
                      - "null"
                      - string
                  displayName:
                    type:
                      - "null"
                      - string
                  firstName:
                    type:
                      - "null"
                      - string
                  lastName:
                    type:
                      - "null"
                      - string
                  email:
                    type: string
                  birthdate:
                    type: string
                  address:
                    type: object
