  /v1/public/posts:
    get:
      summary: Browse posts (Beliefs), newest first. Filters are echoed, not resolved
        (counts resolve geo/tier).
      tags:
        - public
      parameters:
        - schema:
            type: string
            enum:
              - jurisdiction
              - impacted-region
              - my-district
              - all-public
          in: query
          name: scope
          required: false
          description: Coarse geo audience (echoed on lists, not resolved).
        - schema:
            anyOf:
              - type: string
                enum:
                  - unverified
                  - identity_verified
                  - residency_verified
                  - electoral_validated
              - type: array
                items:
                  type: string
                  enum:
                    - unverified
                    - identity_verified
                    - residency_verified
                    - electoral_validated
          in: query
          name: tier
          required: false
          description: KYC tier(s); repeatable (echoed on lists, not resolved).
        - schema:
            type: string
          in: query
          name: jurisdiction
          required: false
          description: Jurisdiction filter for multi-jurisdiction browse (echoed, not
            resolved).
        - schema:
            type: string
            format: date
          in: query
          name: from
          required: false
          description: Start date, ISO (echoed, not resolved).
        - schema:
            type: string
            format: date
          in: query
          name: to
          required: false
          description: End date, ISO (echoed, not resolved).
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          in: query
          name: limit
          required: false
        - schema:
            type: integer
            minimum: 0
            default: 0
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        entityId:
                          type: string
                        type:
                          type: string
                        content:
                          nullable: true
                        withheld:
                          type: boolean
                        createdAt:
                          type: string
                        audienceScope:
                          type: object
                          description: Audience metadata for clients/future filters (not write-policy).
                            Not PII.
                          properties:
                            jurisdiction:
                              type: string
                              description: Jurisdiction id (default oursay-global when no persona is bound).
                            appliesToRegion:
                              nullable: true
                              description: 'Geographic stake as a RegionRef: a base ref string ("jurisdiction"
                                | "district:<district_slug>" |
                                "revision:<revisionId>" | "region:<presetId>")
                                or an { op: "and"|"or"|"not", refs: RegionRef[]
                                } union. Null ⇒ whole jurisdiction. (A legacy
                                appliesToDistrictIds stake is surfaced here as
                                an OR of revisions.)'
                          required:
                            - jurisdiction
                            - appliesToRegion
                        reactions:
                          type: array
                          items:
                            type: object
                            properties:
                              kind:
                                type: string
                              count:
                                type: integer
                                nullable: true
                                description: Null when suppressed by the k-anonymity floor.
                              suppressed:
                                type: boolean
                                description: Present and true when this bucket was suppressed.
                            required:
                              - kind
                              - count
                      required:
                        - entityId
                        - type
                        - createdAt
                        - audienceScope
                        - reactions
                  page:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
                      total:
                        type: integer
                    required:
                      - limit
                      - offset
                      - total
                  filters:
                    type: object
                    description: Filter echo. `applied.geo`/`applied.tier` are resolved on count
                      endpoints; date not yet implemented.
                    properties:
                      scope:
                        type: string
                        enum:
                          - jurisdiction
                          - impacted-region
                          - my-district
                          - all-public
                      tier:
                        type: array
                        items:
                          type: string
                          enum:
                            - unverified
                            - identity_verified
                            - residency_verified
                            - electoral_validated
                        nullable: true
                      jurisdiction:
                        type: string
                        nullable: true
                      from:
                        type: string
                        nullable: true
                      to:
                        type: string
                        nullable: true
                      applied:
                        type: object
                        description: Per-dimension applied status. `geo`/`tier` are resolved on count
                          endpoints; `date` is not yet implemented. When a count
                          is withheld or tier-gated by jurisdiction policy
                          (countGating ≠ none with a null scalar), no filter
                          runs, so `geo`/`tier` stay false even if scope/tier
                          were supplied.
                        properties:
                          geo:
                            type: boolean
                            description: True when scope compiled to a region and narrowed the count.
                          tier:
                            type: boolean
                            description: True when a requested tier set narrowed the count (counts only;
                              never on lists/detail).
                          date:
                            type: boolean
                            description: Always false (date filtering not yet implemented).
                        required:
                          - geo
                          - tier
                          - date
                      kAnonymityFloor:
                        type: integer
                        nullable: true
                        description: Effective k-anonymity floor applied when a count is narrowed by geo
                          or tier; null on lists/all-public(no
                          tier)/my-district.
                      note:
                        type: string
                    required:
                      - scope
                      - tier
                      - jurisdiction
                      - from
                      - to
                      - applied
                      - kAnonymityFloor
                      - note
                required:
                  - items
                  - page
                  - filters
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
