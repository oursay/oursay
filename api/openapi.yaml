                        description: Jurisdiction id (default oursay-global when no persona is bound).
                      appliesToRegion:
                        nullable: true
                        description: 'Geographic stake as a RegionRef: a base ref string ("jurisdiction"
                          | "district:<district_slug>" | "revision:<revisionId>"
                          | "region:<presetId>") or an { op: "and"|"or"|"not",
                          refs: RegionRef[] } union. Null ⇒ whole jurisdiction.
                          (A legacy appliesToDistrictIds stake is surfaced here
                          as an OR of revisions.)'
                    required:
                      - jurisdiction
                      - appliesToRegion
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        option:
                          type: string
                        count:
                          type: integer
                          nullable: true
                          description: Null when suppressed by the k-anonymity floor.
                        suppressed:
                          type: boolean
                          description: Present and true when this bucket was suppressed.
                      required:
                        - option
                        - count
                  countGating:
                    type: string
                    enum:
                      - none
                      - withheld
                      - tier-gated
                    description: "Public count exposure for this entity's jurisdiction: none
                      (exposed), withheld (never public), tier-gated (only when
                      filtered to verified tiers)."
                  countGatingNote:
                    type: string
                    description: Human-readable reason the count is visible, withheld, or
                      tier-gated.
                  reactionsByEntity:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                        count:
                          type: integer
                          nullable: true
                          description: Null when suppressed by the k-anonymity floor.
                        suppressed:
                          type: boolean
                          description: Present and true when this bucket was suppressed.
                      required:
                        - kind
                        - count
                  reactionsByCurrentRevision:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                        count:
                          type: integer
                          nullable: true
                          description: Null when suppressed by the k-anonymity floor.
                        suppressed:
                          type: boolean
                          description: Present and true when this bucket was suppressed.
                      required:
                        - kind
                        - count
                  comments:
                    type: array
                    items:
                      type: object
                      properties:
                        state:
                          type: object
                          properties:
                            entityId:
                              type: string
                            type:
                              type: string
                            latestOp:
                              type: string
                            contentHash:
                              type: string
                            content:
                              description: Opaque payload, or null when withheld.
                              nullable: true
                            withheld:
                              type: boolean
                            isDeleted:
                              type: boolean
                            isRedacted:
                              type: boolean
                            isErased:
                              type: boolean
                          required:
                            - entityId
                            - type
                            - withheld
                            - isDeleted
                            - isRedacted
                            - isErased
                        reactionsByEntity:
                          type: array
                          items:
                            type: object
                            properties:
                              kind:
                                type: string
                              count:
                                type: integer
                                nullable: true
                                description: Null when suppressed by the k-anonymity floor.
                              suppressed:
                                type: boolean
                                description: Present and true when this bucket was suppressed.
                            required:
                              - kind
                              - count
                        reactionsByCurrentRevision:
                          type: array
                          items:
                            type: object
                            properties:
                              kind:
                                type: string
                              count:
                                type: integer
                                nullable: true
                                description: Null when suppressed by the k-anonymity floor.
                              suppressed:
                                type: boolean
                                description: Present and true when this bucket was suppressed.
                            required:
                              - kind
                              - count
                        replies:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                      required:
                        - state
                        - reactionsByEntity
                        - reactionsByCurrentRevision
                        - replies
                required:
                  - root
                  - audienceScope
                  - results
                  - countGating
                  - comments
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/public/polls/{id}/counts:
    get:
      summary: Option results for a poll (jurisdiction exposure gate + geo scope + KYC
        tier + k-anonymity; date stubbed).
      tags:
        - public
      parameters:
        - schema:
            type: string
            enum:
              - jurisdiction
              - impacted-region
              - my-district
              - all-public
          in: query
          name: scope
          required: false
          description: Coarse geo audience — RESOLVED on counts (region-first +
            k-anonymity); my-district is inert.
        - schema:
            anyOf:
              - type: string
                enum:
                  - unverified
                  - identity_verified
                  - residency_verified
                  - electoral_validated
              - type: array
                items:
                  type: string
                  enum:
                    - unverified
                    - identity_verified
                    - residency_verified
                    - electoral_validated
          in: query
          name: tier
          required: false
          description: "KYC tier(s); repeatable. RESOLVED on counts: a participant is
            counted if their current tier is in the set (set membership, not
            at-or-above)."
        - schema:
            type: string
            format: date
          in: query
          name: from
          required: false
          description: Start date, ISO (echoed, not resolved).
        - schema:
            type: string
            format: date
          in: query
          name: to
          required: false
          description: End date, ISO (echoed, not resolved).
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Root entity id.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  entityId:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        option:
                          type: string
                        count:
                          type: integer
                          nullable: true
                          description: Null when suppressed by the k-anonymity floor.
                        suppressed:
                          type: boolean
                          description: Present and true when this bucket was suppressed.
                      required:
                        - option
                        - count
                  countGating:
                    type: string
                    enum:
                      - none
                      - withheld
                      - tier-gated
                    description: "Public count exposure for this entity's jurisdiction: none
                      (exposed), withheld (never public), tier-gated (only when
                      filtered to verified tiers)."
                  countGatingNote:
                    type: string
                    description: Human-readable reason the count is visible, withheld, or
                      tier-gated.
                  filters:
                    type: object
                    description: Filter echo. `applied.geo`/`applied.tier` are resolved on count
                      endpoints; date not yet implemented.
                    properties:
                      scope:
                        type: string
                        enum:
                          - jurisdiction
                          - impacted-region
                          - my-district
                          - all-public
                      tier:
                        type: array
                        items:
                          type: string
                          enum:
                            - unverified
                            - identity_verified
                            - residency_verified
                            - electoral_validated
                        nullable: true
                      jurisdiction:
                        type: string
                        nullable: true
                      from:
                        type: string
                        nullable: true
                      to:
                        type: string
                        nullable: true
                      applied:
                        type: object
                        description: Per-dimension applied status. `geo`/`tier` are resolved on count
                          endpoints; `date` is not yet implemented. When a count
                          is withheld or tier-gated by jurisdiction policy
                          (countGating ≠ none with a null scalar), no filter
                          runs, so `geo`/`tier` stay false even if scope/tier
                          were supplied.
                        properties:
                          geo:
                            type: boolean
                            description: True when scope compiled to a region and narrowed the count.
                          tier:
                            type: boolean
                            description: True when a requested tier set narrowed the count (counts only;
                              never on lists/detail).
                          date:
                            type: boolean
                            description: Always false (date filtering not yet implemented).
                        required:
                          - geo
                          - tier
                          - date
                      kAnonymityFloor:
                        type: integer
                        nullable: true
                        description: Effective k-anonymity floor applied when a count is narrowed by geo
                          or tier; null on lists/all-public(no
                          tier)/my-district.
                      note:
                        type: string
                    required:
                      - scope
                      - tier
                      - jurisdiction
                      - from
                      - to
                      - applied
                      - kAnonymityFloor
                      - note
                required:
                  - entityId
                  - results
                  - countGating
                  - filters
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/public/jurisdictions:
    get:
      summary: List registered jurisdictions (id + level + optional public label,
        per-record-type labels, and content caps). No policy fields.
      tags:
        - public
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        level:
                          type: string
                          description: Governmental tier (federal | provincial | municipal | …).
                        label:
                          type: string
                          description: Public display name; absent ⇒ fall back to id.
                        labels:
                          type: object
                          properties:
                            post:
                              type: string
                              description: "Label for a `post` (default: Statement)."
                            petition:
                              type: string
                              description: "Label for a `petition` (default: Petition)."
                            poll:
                              type: string
                              description: "Label for a `poll` (default: Poll)."
                            result:
                              type: string
                              description: "Label for a poll `result` (default: Result)."
                            district:
                              type: string
                              description: "Label for a district (e.g. Alberta: riding)."
                        contentLimits:
                          type: object
                          properties:
                            post:
                              type: object
                              properties:
                                title:
                                  type: number
                                body:
                                  type: number
                            comment:
                              type: object
                              properties:
                                body:
                                  type: number
                            petition:
                              type: object
                              properties:
                                title:
                                  type: number
                                text:
                                  type: number
                            poll:
                              type: object
                              properties:
                                question:
                                  type: number
                                option:
                                  type: number
                                maxOptions:
                                  type: number
                                description:
                                  type: number
                      required:
                        - id
                        - level
                required:
                  - items
  /v1/public/jurisdictions/{jurisdictionId}/districts:
    get:
      summary: "Effective-dated district directory at asOf (default: today UTC). One
        revision per riding; registered jurisdiction with no ingested boundaries
        returns an empty list. include=geometry embeds boundaries (heavy)."
      tags:
        - public
      parameters:
        - schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
          in: query
          name: asOf
          required: false
          description: "UTC calendar date (YYYY-MM-DD). Default: today's UTC date. Selects
            one revision per riding (latest effective_date <= asOf)."
        - schema:
            type: string
            enum:
              - geometry
          in: query
          name: include
          required: false
          description: include=geometry embeds each riding's GeoJSON boundary. Heavy for a
            full jurisdiction (~tens of MultiPolygons); default is
            metadata-only.
        - schema:
            type: string
          in: path
          name: jurisdictionId
          required: true
          description: Registered jurisdiction id.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jurisdictionId:
                    type: string
                  asOf:
                    type: string
                    description: The resolved UTC calendar date (YYYY-MM-DD) the directory was
                      selected at.
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Stable district revision id (year-anchored slug).
                        name:
                          type: string
                          description: Display name of the district.
                        districtSlug:
                          type: string
                          description: Year-less logical-seat key grouping revisions across redraws.
                        effectiveDate:
                          type: string
                          description: First day this geometry is in force (YYYY-MM-DD); the asOf lookup
                            key.
                        drawnDate:
                          type: string
                          nullable: true
                          description: When the boundary was drawn/enacted, if known (YYYY-MM-DD).
                        source:
                          type: string
                          description: Provenance (file + authority).
                        sourceRef:
                          type: string
                          nullable: true
                          description: Original source id (e.g. EDNumber20).
                        geometry:
                          type: object
                          additionalProperties: true
                          description: Official boundary as a GeoJSON MultiPolygon (EPSG:4326). Present
                            only when include=geometry.
                      required:
                        - id
                        - name
                        - districtSlug
                        - effectiveDate
                        - source
                required:
                  - jurisdictionId
                  - asOf
                  - items
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/public/jurisdictions/{jurisdictionId}/districts/{revisionId}/geometry:
    get:
      summary: Official GeoJSON MultiPolygon (EPSG:4326) for one district revision by
        id. Returns ANY ingested revision, including superseded redraws not in
        the current effective set (correct for audit).
      tags:
        - public
      parameters:
        - schema:
            type: string
          in: path
          name: jurisdictionId
          required: true
          description: Registered jurisdiction id.
        - schema:
            type: string
          in: path
          name: revisionId
          required: true
          description: District revision id.
      responses:
        "200":
          description: A GeoJSON MultiPolygon (EPSG:4326) — the official boundary of the
            requested district revision.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: A GeoJSON MultiPolygon (EPSG:4326) — the official boundary of the
                  requested district revision.
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
