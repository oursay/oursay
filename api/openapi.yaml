openapi: 3.0.3
info:
  title: OurSay Account API
  description: Account registration & authentication. Email OTP is
    bootstrap/recovery only; WebAuthn passkeys are the day-to-day login. These
    passkeys are the ACCOUNT-LOGIN factor and are separate from the civic
    thread-signing keys in @oursay/public-record.
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token
    cookieAuth:
      type: apiKey
      in: cookie
      name: oursay_session
  schemas: {}
paths:
  /healthz:
    get:
      summary: Health check
      tags:
        - meta
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                required:
                  - status
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                required:
                  - status
  /v1/auth/otp/request:
    post:
      summary: Request an email one-time code (registration, recovery, or gated login)
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                purpose:
                  type: string
                  enum:
                    - registration
                    - recovery
                    - login
                  default: registration
              required:
                - email
              additionalProperties: false
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - sent
                  expiresAt:
                    type: string
                    format: date-time
                    description: UTC instant after which the issued code is invalid (matches
                      OTP_TTL_SEC).
                required:
                  - status
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/otp/verify:
    post:
      summary: Verify a registration code with a profile body to create the account
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 1
                profile:
                  type: object
                  properties:
                    handle:
                      type: string
                      description: Optional unique @username (public profile). Letters, digits,
                        underscore; no spaces.
                    displayName:
                      type: string
                      description: Optional public display text; defaults to the handle without its
                        '@'.
                    firstName:
                      type: string
                      description: Private PII (KYC); never publicly surfaced.
                    lastName:
                      type: string
                      description: Private PII (KYC); never publicly surfaced.
                    birthdate:
                      type: string
                      pattern: ^\d{4}-\d{2}-\d{2}$
                      description: YYYY-MM-DD; age gate (18+) enforced server-side.
                    address:
                      type: object
                      description: Address components (Canada-centric storage; the front-end owns
                        localized labels). No district binding is stored.
                      properties:
                        line1:
                          type: string
                        line2:
                          type: string
                        city:
                          type: string
                        province:
                          type: string
                          description: Province/territory.
                        postalCode:
                          type: string
                        country:
                          type: string
                          description: ISO country code; defaults to CA.
                        memo:
                          type: string
                          description: Free field for jurisdiction-specific edge cases.
                      additionalProperties: false
                  required:
                    - birthdate
                  additionalProperties: false
              required:
                - email
                - code
                - profile
              additionalProperties: false
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                          - login
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/register/options:
    post:
      summary: Begin passkey enrollment (returns WebAuthn creation options)
      tags:
        - passkey
      security: &a1
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/register/verify:
    post:
      summary: Complete passkey enrollment (store the credential)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
                  additionalProperties: true
                label:
                  type: string
              required:
                - response
              additionalProperties: false
      security: *a1
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentialId:
                    type: string
                required:
                  - credentialId
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkeys:
    get:
      summary: List the caller's enrolled account-login passkeys (devices)
      tags:
        - passkey
      security: *a1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkeys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Stable id used to revoke this passkey.
                        label:
                          type: string
                          nullable: true
                          description: Optional human label, e.g. "Alice's laptop".
                        transports:
                          type: string
                          nullable: true
                          description: CSV of authenticator transports.
                        createdAt:
                          type: string
                          format: date-time
                        lastUsedAt:
                          type: string
                          format: date-time
                          nullable: true
                      required:
                        - id
                        - label
                        - transports
                        - createdAt
                        - lastUsedAt
                required:
                  - passkeys
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/revoke:
    post:
      summary: Remove one of the caller's passkeys (kick a compromised/retired device)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
              required:
                - id
              additionalProperties: false
      security: *a1
      responses:
        "204":
          description: Default Response
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/login/options:
    post:
      summary: Begin passkey login (returns WebAuthn request options)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/auth/passkey/login/verify:
    post:
      summary: Complete passkey login (assertion → session)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
                  additionalProperties: true
              required:
                - response
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                          - login
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/session:
    get:
      summary: Describe the current session
      tags:
        - auth
      security: *a1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  scope:
                    type: string
                    enum:
                      - full
                      - recovery
                required:
                  - userId
                  - scope
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/logout:
    post:
      summary: Revoke the current session
      tags:
        - auth
      security: *a1
      responses:
        "204":
          description: Default Response
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/recovery/verify:
    post:
      summary: Verify a recovery code (unverified → recovery session; verified → KYC
        re-verification required)
      tags:
        - recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 1
              required:
                - email
                - code
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - passkey_reenroll
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                          - login
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - status
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/login/enable:
    post:
      summary: Authorize cross-device login from a trusted device (sends a login OTP
        to the account email)
      tags:
        - login
      description: Requires a full session AND at least one enrolled passkey. Opens a
        short-lived login window (TTL = OTP_TTL_SEC) and emails a one-time code
        to sign in on another device.
      security: *a1
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - sent
                  expiresAt:
                    type: string
                    format: date-time
                    description: UTC instant after which the issued code is invalid (matches
                      OTP_TTL_SEC).
                required:
                  - status
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/login/verify:
    post:
      summary: Complete cross-device login (login OTP → limited enroll-only session)
      tags:
        - login
      description: Succeeds only if a login window was opened from a trusted device.
        Issues a 'login'-scoped session that may enroll a passkey; full access
        comes from the subsequent passkey login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 1
              required:
                - email
                - code
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - passkey_enroll
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                          - login
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - status
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/civic/devices:
    post:
      summary: Enrol a civic signing device key (public key only)
      tags:
        - civic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                devicePubkey:
                  type: string
                  minLength: 1
                label:
                  type: string
              required:
                - devicePubkey
              additionalProperties: false
      security: *a1
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  devicePubkey:
                    type: string
                    description: SEC1 P-256 public key (hex). Public key only — never a private key.
                  label:
                    type: string
                    nullable: true
                    description: Optional human label, e.g. "Alice's iPhone".
                  enrolledAt:
                    type: string
                    format: date-time
                required:
                  - devicePubkey
                  - label
                  - enrolledAt
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
    get:
      summary: List the caller's enrolled (non-revoked) civic device keys
      tags:
        - civic
      security: *a1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        devicePubkey:
                          type: string
                          description: SEC1 P-256 public key (hex). Public key only — never a private key.
                        label:
                          type: string
                          nullable: true
                          description: Optional human label, e.g. "Alice's iPhone".
                        enrolledAt:
                          type: string
                          format: date-time
                      required:
                        - devicePubkey
                        - label
                        - enrolledAt
                required:
