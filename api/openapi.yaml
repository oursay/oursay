openapi: 3.0.3
info:
  title: OurSay Account API
  description: Account registration & authentication. Email OTP is
    bootstrap/recovery only; WebAuthn passkeys are the day-to-day login. These
    passkeys are the ACCOUNT-LOGIN factor and are separate from the civic
    thread-signing keys in @oursay/public-record.
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token
    cookieAuth:
      type: apiKey
      in: cookie
      name: oursay_session
  schemas: {}
paths:
  /healthz:
    get:
      summary: Health check
      tags:
        - meta
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                required:
                  - status
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                required:
                  - status
  /v1/auth/otp/request:
    post:
      summary: Request an email one-time code (registration or recovery)
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                purpose:
                  type: string
                  enum:
                    - registration
                    - recovery
                  default: registration
              required:
                - email
              additionalProperties: false
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - sent
                  expiresAt:
                    type: string
                    format: date-time
                    description: UTC instant after which the issued code is invalid (matches
                      OTP_TTL_SEC).
                required:
                  - status
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/otp/verify:
    post:
      summary: Verify a registration code with a profile body to create the account
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 1
                profile:
                  type: object
                  properties:
                    displayName:
                      type: string
                      minLength: 1
                      description: Public-facing handle (the only field intended for future public
                        surfacing).
                    birthdate:
                      type: string
                      pattern: ^\d{4}-\d{2}-\d{2}$
                      description: YYYY-MM-DD; age gate (18+) enforced server-side.
                    address:
                      type: object
                      description: Generic address components. The front-end owns localized labels; no
                        region binding is stored.
                      properties:
                        line1:
                          type: string
                        line2:
                          type: string
                        city:
                          type: string
                        region:
                          type: string
                          description: Province/state/etc.
                        postalCode:
                          type: string
                        country:
                          type: string
                          description: ISO country code; defaults to CA.
                        memo:
                          type: string
                          description: Free field for region-specific edge cases.
                      additionalProperties: false
                  required:
                    - displayName
                    - birthdate
                  additionalProperties: false
              required:
                - email
                - code
                - profile
              additionalProperties: false
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/register/options:
    post:
      summary: Begin passkey enrollment (returns WebAuthn creation options)
      tags:
        - passkey
      security: &a1
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/register/verify:
    post:
      summary: Complete passkey enrollment (store the credential)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
                  additionalProperties: true
                label:
                  type: string
              required:
                - response
              additionalProperties: false
      security: *a1
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentialId:
                    type: string
                required:
                  - credentialId
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/passkey/login/options:
    post:
      summary: Begin passkey login (returns WebAuthn request options)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/auth/passkey/login/verify:
    post:
      summary: Complete passkey login (assertion → session)
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
                  additionalProperties: true
              required:
                - response
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/session:
    get:
      summary: Describe the current session
      tags:
        - auth
      security: *a1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  scope:
                    type: string
                    enum:
                      - full
                      - recovery
                required:
                  - userId
                  - scope
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/logout:
    post:
      summary: Revoke the current session
      tags:
        - auth
      security: *a1
      responses:
        "204":
          description: Default Response
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/recovery/request:
    post:
      summary: Request a recovery code (sent only if an account exists)
      tags:
        - recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
              additionalProperties: false
      responses:
        "202":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - sent
                  expiresAt:
                    type: string
                    format: date-time
                    description: UTC instant after which the issued code is invalid (matches
                      OTP_TTL_SEC).
                required:
                  - status
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/auth/recovery/verify:
    post:
      summary: Verify a recovery code (unverified → recovery session; verified → KYC
        re-verification required)
      tags:
        - recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 1
              required:
                - email
                - code
              additionalProperties: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - passkey_reenroll
                  userId:
                    type: string
                    format: uuid
                  session:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Opaque bearer token (also set as an HttpOnly cookie).
                      scope:
                        type: string
                        enum:
                          - full
                          - recovery
                      userId:
                        type: string
                        format: uuid
                      expiresAt:
                        type: string
                        format: date-time
                    required:
                      - token
                      - scope
                      - userId
                      - expiresAt
                required:
                  - status
                  - userId
                  - session
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "409":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "429":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
  /v1/profile:
    get:
      summary: Get the authenticated user's own profile (private PII)
      tags:
        - profile
      security: *a1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  displayName:
                    type:
                      - "null"
                      - string
                  email:
                    type: string
                  birthdate:
                    type: string
                  address:
                    type: object
                    properties:
                      line1:
                        type:
                          - "null"
                          - string
                      line2:
                        type:
                          - "null"
                          - string
                      city:
                        type:
                          - "null"
                          - string
                      region:
                        type:
                          - "null"
                          - string
                      postalCode:
                        type:
                          - "null"
                          - string
                      country:
                        type: string
                      memo:
                        type:
                          - "null"
                          - string
                required:
                  - userId
                  - email
                  - birthdate
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                required:
                  - error
tags:
  - name: auth
    description: Registration, sessions, OTP
  - name: passkey
    description: WebAuthn passkey enrollment + login
  - name: recovery
    description: Account recovery via email OTP
  - name: profile
    description: Private account profile
  - name: meta
    description: Health & docs
